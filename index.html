<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartas para Pame</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0b0f;
      --surface: #13101a;
      --border: #2a1f35;
      --accent: #7c3f6e;
      --accent-soft: #a0587e;
      --gold: #c9a96e;
      --text: #e8ddd0;
      --text-muted: #8a7a6e;
      --blood: #8b2a3a;
      --admin-bg: #0f172a;
      --admin-border: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    .bat {
      position: fixed;
      opacity: 0.07;
      pointer-events: none;
      fill: var(--accent-soft);
    }
    .bat-tl { top: 3%; left: 2%; width: 90px; transform: rotate(-20deg); }
    .bat-tr { top: 5%; right: 4%; width: 60px; transform: rotate(15deg) scaleX(-1); }
    .bat-bl { bottom: 6%; left: 5%; width: 50px; transform: rotate(10deg); }
    .bat-br { bottom: 4%; right: 3%; width: 75px; transform: rotate(-10deg) scaleX(-1); }

    .moon {
      position: fixed;
      top: -40px;
      right: 80px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #f5e6c8, #c9a96e88);
      box-shadow: 0 0 60px 20px #c9a96e22;
      opacity: 0.13;
      pointer-events: none;
    }

    .container {
      max-width: 560px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-title {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--text);
    }

    .header-title em {
      font-style: italic;
      color: var(--accent-soft);
    }

    /* ─── FORM ─── */
    .form-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
    }

    .form-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-textarea {
      resize: vertical;
      min-height: 150px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); opacity: 0.4; font-style: italic; }

    .form-btn {
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--accent-soft);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .form-btn:hover { background: var(--accent); color: var(--text); }

    .error-msg {
      margin-top: 0.8rem;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--blood);
      text-align: center;
      min-height: 1.2rem;
    }

    .success-msg {
      margin-top: 0.8rem;
      font-style: italic;
      font-size: 0.85rem;
      color: #7adf7a;
      text-align: center;
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* ─── PANELS VIEW CONTROL ─── */
    .view-section { display: none; }
    .view-section.active { display: block; }

    .back-btn {
      display: inline-block;
      margin-top: 1.8rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    /* ─── EDITOR ADMIN ─── */
    .admin-wrapper {
      background: var(--admin-bg);
      border: 1px solid var(--admin-border);
      border-radius: 4px;
      padding: 2rem;
    }
    .admin-group {
      margin-bottom: 1.2rem;
    }
    .admin-btn {
      border-color: #3b82f6;
      color: #60a5fa;
    }
    .admin-btn:hover {
      background: #3b82f6;
      color: white;
    }

    /* ─── GALERÍAS DENTRO DEL PANEL ─── */
    .gallery-section {
      margin-top: 2rem;
      border-top: 1px dashed var(--admin-border);
      padding-top: 1.5rem;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-top: 0.8rem;
    }
    @media(min-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr 1fr; }
    }
    
    /* Minitarjetas de las cartas guardadas */
    .gallery-card-thumb {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1rem;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
    }
    .gallery-card-thumb:hover {
      transform: translateY(-2px);
      border-color: #3b82f6;
    }
    .thumb-code {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #38bdf8;
      display: block;
      margin-bottom: 0.25rem;
    }
    .thumb-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .thumb-style-tag {
      font-size: 0.65rem;
      background: #0f172a;
      color: #94a3b8;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      position: absolute;
      bottom: 0.8rem;
      right: 0.8rem;
      text-transform: uppercase;
    }

    /* Previsualizador de Estilos (NUEVO) */
    .styles-preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.8rem;
    }
    .style-thumb {
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }
    .style-thumb:hover {
      transform: scale(1.02);
    }
    .style-thumb.selected {
      border-color: #60a5fa;
      box-shadow: 0 0 8px rgba(96, 165, 250, 0.3);
    }
    .style-thumb-title {
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #94a3b8;
    }
    
    /* Muestras tipográficas en miniatura */
    .st-preview-box {
      font-size: 0.8rem;
      padding: 0.5rem;
      border-radius: 2px;
      line-height: 1.2;
    }
    .st-a-box { background: #0d0b0f; color: #e8ddd0; font-family: 'Lora', serif; border-bottom: 1px solid #2a1f35; }
    .st-b-box { background: #1a1208; color: #c8b888; font-family: 'Playfair Display', serif; font-style: italic; }
    .st-c-box { background: #080c08; color: #7adf7a; font-family: 'Space Mono', monospace; text-align: left; }
    .st-d-box { background: #100818; color: #ccc0d8; font-family: 'Lora', serif; border: 1px solid #3a1f4a; }

    .gallery-empty {
      color: #64748b;
      font-size: 0.85rem;
      font-style: italic;
      text-align: center;
      padding: 1rem;
    }

    /* ══════════════════════════════════════
       ESTILOS DE CARTA (Flujo de lectura)
    ══════════════════════════════════════ */
    .style-a .letter-card { padding: 0; background: transparent; border: none; }
    .style-a .letter-tag { font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2rem; display: block; }
    .style-a .letter-title { font-family: 'Lora', serif; font-size: 2rem; font-weight: 400; font-style: italic; color: var(--text); margin-bottom: 2.5rem; line-height: 1.2; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .style-a .letter-body { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 2; color: #d4c9bc; }
    .style-a .letter-body p { margin-bottom: 1.4rem; }
    .style-a .letter-sign { margin-top: 2.5rem; font-family: 'Lora', serif; font-style: italic; font-size: 1rem; color: var(--accent-soft); text-align: right; }
